<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form method="POST" action="/pecas">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" required><br><br>

        <label for="nome">Veiculo:</label>
        <input type="text" id="veiculo" name="veiculo" required><br><br>

        <label for="preco">Preço:</label>
        <input type="number" id="preco" name="preco" required><br><br>

        <button type="submit">Cadastrar</button>
  </form>

  <hr>
  
    <h2>Lista de peças:</h2>
    <ul>
        {% for peca in pecas %}
        <li>
            {{ peca.nome }} - {{ peca.descricao }} - {{ peca.preco}} - {{peca.veiculo}}
            [<a href="/remover/{{ peca.id }}"
                onclick="return confirm('Tem certeza que deseja remover esta peça?')">Remover</a>]
            [<a href="/editar/{{ peca.id }}">Editar</a>]
        </li>
        {% endfor %}
    </ul>
</body>
</html>
